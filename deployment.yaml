apiVersion: apps/v1
kind: Deployment
metadata:
  name: labcat-conference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conference-site
  template:
    metadata:
      labels:
        app: conference-site
    spec:
      containers:
      - name: web-container
        image: khushmeen-kaur/labcat:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: labcat-service
spec:
  type: NodePort
  selector:
    app: conference-site
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001
